<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>
</head>
<body>

    <main>
        <h1>Password Strength Analyzer</h1>

        <section>
            <h2>Enter Password</h2>
            <label for="pass">Password:</label>
            <input type="password" id="pass" placeholder="Enter your password"> 
            <button>Analyze Strength</button>
        </section>

        <hr>

        <section>
        <h2>Analysis Result</h2>
        <p><strong>Strength:</strong> <span id="strength"></span></p>
        <p><strong>Entropy:</strong> <span id="entropy"></span></p>
        <p><strong>Crack Time:</strong> <span id="time"></span></p>
        <p><strong>Suggestions:</strong> <span id="suggestions"></span></p>
        </section>
    </main>

</body>
</html>
